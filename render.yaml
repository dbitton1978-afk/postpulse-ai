services:
  - type: web
    name: postpulse-server2
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        value: postpulse-super-secret-123

  - type: static_site
    name: postpulse-client2
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://postpulse-server2.onrender.com
